<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Criticality: Online Multiplayer</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; cursor: pointer; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; touch-action: none; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 2px solid rgba(255,255,255,0.9); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 20; box-shadow: 0 0 4px rgba(0,0,0,0.5); }
        
        .mobile-controls { display: none; position: absolute; bottom: 30px; width: 100%; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; z-index: 100; user-select: none; -webkit-user-select: none; }
        @media (pointer: coarse) { .mobile-controls { display: flex; } }
        .joystick-zone { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; pointer-events: auto; border: 2px solid rgba(255,255,255,0.2); }
        .joystick-knob { width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; position: absolute; top: 35px; left: 35px; pointer-events: none; }
        .button-stack { display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .mobile-btn { width: 70px; height: 70px; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .mobile-btn:active { background: rgba(255,255,255,0.4); }

        /* UI ADDITIONS */
        #top-bar { position: absolute; top: 15px; left: 15px; z-index: 60; display: flex; align-items: center; gap: 15px; pointer-events: auto; }
        .menu-icon { width: 40px; height: 40px; background: rgba(20,20,25,0.8); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: white; font-weight: bold; }
        .menu-icon:hover { background: rgba(255,255,255,0.2); }
        #status { color: rgba(255,255,255,0.8); font-size: 14px; font-family: monospace; text-shadow: 1px 1px 2px #000; }

        /* PLAYER LIST */
        #player-list { position: absolute; top: 15px; right: 15px; width: 220px; max-height: 400px; overflow-y: auto; z-index: 60; display: flex; flex-direction: column; gap: 6px; pointer-events: auto; }
        .player-profile { display: flex; align-items: center; background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 6px 10px; color: white; font-size: 13px; font-weight: bold; text-shadow: 1px 1px 2px #000; transition: background 0.2s; }
        .player-profile:hover { background: rgba(30, 30, 40, 0.8); }
        .player-profile img { width: 32px; height: 32px; border-radius: 6px; margin-right: 12px; background-color: #F5CD2F; object-fit: contain; }

        /* CHAT UI */
        #chat-container { position: absolute; top: 65px; left: 15px; width: 320px; height: 200px; display: flex; flex-direction: column; z-index: 150; pointer-events: none; }
        #chat-messages { flex-grow: 1; overflow-y: auto; color: white; font-weight: bold; text-shadow: 1px 1px 2px #000; font-size: 14px; display: flex; flex-direction: column; gap: 2px; margin-bottom: 5px; pointer-events: auto; }
        .chat-msg { word-wrap: break-word; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px; }
        #chat-input-wrapper { opacity: 0.5; transition: 0.2s; pointer-events: auto; }
        #chat-input-wrapper:focus-within, #chat-input-wrapper:hover { opacity: 1; }
        #chat-input { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; outline: none; }

        /* MENU UI */
        #in-game-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 700px; max-width: 90%; height: 500px; background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; z-index: 200; display: none; flex-direction: column; color: white; pointer-events: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .menu-nav { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { flex: 1; padding: 15px; background: none; border: none; color: #888; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .nav-btn.active { color: white; border-bottom: 2px solid white; background: rgba(255,255,255,0.05); }
        .menu-body { padding: 20px; overflow-y: auto; flex-grow: 1; display: none; }
        .menu-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-action { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .menu-action:hover { background: rgba(255,255,255,0.2); }
        .btn-red { background: #E74C3C; border-color: #C0392B; }
        .btn-red:hover { background: #C0392B; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="menu-icon" id="open-menu-btn" title="Menu">Rbx</div>
        <div id="status">Status: Connecting...</div>
    </div>

    <div id="player-list"></div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <div id="chat-input-wrapper">
            <input type="text" id="chat-input" placeholder="Press '/' or tap here to chat" autocomplete="off">
        </div>
    </div>

    <div id="in-game-menu">
        <div class="menu-nav">
            <button class="nav-btn active" onclick="openTab('Settings')">Settings</button>
            <button class="nav-btn" onclick="openTab('Emotes')">Emotes</button>
            <button class="nav-btn" onclick="openTab('Help')">Help</button>
        </div>
        
        <div class="menu-body" id="tab-Settings" style="display: block;">
            <div class="menu-row">
                <span>Shift Lock Switch</span>
                <button class="menu-action" id="menu-shift-lock">Off</button>
            </div>
            <div class="menu-row">
                <span>Full Screen</span>
                <button class="menu-action" id="menu-fullscreen">Toggle</button>
            </div>
            <div class="menu-row" style="margin-top: 20px;">
                <button class="menu-action btn-red" id="btn-respawn">Respawn Character</button>
                <button class="menu-action btn-red" id="btn-leave">Leave Game</button>
            </div>
        </div>

        <div class="menu-body" id="tab-Emotes">
            <div class="menu-row">
                <span>Play Custom Emote</span>
                <button class="menu-action" onclick="myCurrentEmote='custom'; document.getElementById('in-game-menu').style.display='none'; document.body.requestPointerLock();">Play</button>
            </div>
        </div>

        <div class="menu-body" id="tab-Help">
            <strong>Controls:</strong> WASD to move. Space to jump. Shift to shift-lock. Scroll to zoom in/out.<br><br>
            <strong>Emotes:</strong> type <code>/e custom</code> in chat!
        </div>
    </div>

    <div id="crosshair"></div>

    <div class="mobile-controls">
        <div class="joystick-zone" id="joyZone">
            <div class="joystick-knob" id="joyKnob"></div>
        </div>
        <div class="button-stack">
            <div class="mobile-btn" id="mbShift">SHIFT</div>
            <div class="mobile-btn" id="mbJump">JUMP</div>
        </div>
    </div>

                legL: rLegLGroup, legR: rLegRGroup, armL: rArmLGroup, armR: rArmRGroup, 
                armLMesh: rArmL, armRMesh: rArmR, legLMesh: rLegL, legRMesh: rLegR,
                targetPos: new THREE.Vector3(), targetRot: 0, isMoving: false, walkTime: 0, name: name, lastChatId: 0, currentEmote: "", isDead: false 
            };
        }

        socket.on('playerMoved', (data) => {
            if (!peers[data.id]) {
                peers[data.id] = createRemoteBaboom(data.name);
                scene.add(peers[data.id].mesh);
                updatePlayerList(); 
            }
            const p = peers[data.id];
            p.targetPos.set(data.x, data.y, data.z);
            p.targetRot = data.rot;
            p.isMoving = data.moving;
            p.currentEmote = data.emote || ""; 
            p.isDead = data.dead || false; 
            
            if (data.chatMsg && data.chatId && data.chatId !== p.lastChatId) {
                p.lastChatId = data.chatId; 
                appendToChatBox(data.name, data.chatMsg);
                showChatBubble(p.mesh, data.chatMsg);
            }
        });

        socket.on('playerDisconnected', (id) => {
            if (peers[id]) {
                healCharacter(peers[id].mesh); // Clean up exploded parts if they disconnect while dead
                scene.remove(peers[id].mesh);
                delete peers[id];
                updatePlayerList(); 
            }
        });

        // ==========================================
        // REAL PHYSICS DEATH LOGIC (THE LEGO SHATTER)
        // ==========================================
        let isDead = false; 
        const fallingParts = [];

        function shatterCharacter(charGroup, partsArray) {
            const dropped = [];
            partsArray.forEach(part => {
                const clone = part.clone(); // Clones the body part AND the face sticker if it has one!
                
                const worldPos = new THREE.Vector3();
                part.getWorldPosition(worldPos);
                const worldQuat = new THREE.Quaternion();
                part.getWorldQuaternion(worldQuat);
                
                clone.position.copy(worldPos);
                clone.quaternion.copy(worldQuat);
                clone.scale.set(1,1,1);
                
                // Explode outward with random velocity!
                clone.userData.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.4, 
                    Math.random() * 0.3 + 0.1, 
                    (Math.random() - 0.5) * 0.4
                );
                // Tumbling rotation
                clone.userData.rotVelocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.3,
                    (Math.random() - 0.5) * 0.3,
                    (Math.random() - 0.5) * 0.3
                );
                
                scene.add(clone);
                fallingParts.push(clone);
                dropped.push(clone);
            });
            charGroup.visible = false; // Hide the connected body
            charGroup.userData.droppedParts = dropped;
        }

        function healCharacter(charGroup) {
            if (charGroup.userData.droppedParts) {
                charGroup.userData.droppedParts.forEach(p => {
                    scene.remove(p);
                    const index = fallingParts.indexOf(p);
                    if (index > -1) fallingParts.splice(index, 1);
                });
                charGroup.userData.droppedParts = null;
            }
            charGroup.visible = true; // Show the connected body again
        }

        document.getElementById('btn-respawn').addEventListener('click', () => {
            if (isDead) return; 
            isDead = true; 
            menuOpen = false; 
            menuEl.style.display = 'none'; 
            document.body.requestPointerLock();

            // INSTANTLY SHATTER THE PLAYER
            shatterCharacter(player, [torso, head, armL, armR, legL, legR]);

            // Wait 2.5 seconds to watch the parts bounce, then respawn
            setTimeout(() => {
                healCharacter(player);
                player.position.set(0, 5, 0); 
                velocityY = 0; 
                isDead = false; 
            }, 2500);
        });

        // --- CONTROLS & CAMERA ---
        const keys = { w: false, a: false, s: false, d: false };
        let velocityY = 0, isGrounded = true, camAngle = 0, camTilt = 0.4, walkTime = 0, shiftLock = false, jumpCounter = 0;
        let targetZoom = 14, currentZoom = 14;

        window.addEventListener('wheel', (e) => {
            if (document.activeElement === chatInput || menuOpen) return;
            targetZoom += Math.sign(e.deltaY) * 1.5;
            targetZoom = Math.max(0.5, Math.min(targetZoom, 30));
        });

        function toggleShiftLock() {
            shiftLock = !shiftLock; 
            document.getElementById('crosshair').style.display = shiftLock ? 'block' : 'none'; 
            document.getElementById('menu-shift-lock').innerText = shiftLock ? 'On' : 'Off';
        }

        document.getElementById('menu-shift-lock').addEventListener('click', toggleShiftLock);

        document.addEventListener('keydown', (e) => {
            if (document.activeElement === chatInput) return; 
            
            if (!isDead) {
                if (e.code === 'KeyW') keys.w = true; if (e.code === 'KeyA') keys.a = true;
                if (e.code === 'KeyS') keys.s = true; if (e.code === 'KeyD') keys.d = true;
                if (e.code === 'Space' && isGrounded) { velocityY = 0.55; isGrounded = false; jumpCounter++; myCurrentEmote = ""; }
                if (e.code.includes('Shift')) toggleShiftLock();
            }

            if (e.code === 'KeyI') targetZoom = Math.max(0.5, targetZoom - 2);
            if (e.code === 'KeyO') targetZoom = Math.min(30, targetZoom + 2);  
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') keys.w = false; if (e.code === 'KeyA') keys.a = false;
            if (e.code === 'KeyS') keys.s = false; if (e.code === 'KeyD') keys.d = false;
        });

        window.addEventListener('mousedown', (e) => { 
            if(menuOpen || e.target.closest('#in-game-menu') || e.target.closest('#top-bar') || e.target.closest('#chat-container') || e.target.closest('#player-list')) return;
            if(!('ontouchstart' in window)) document.body.requestPointerLock(); 
        });
        
        document.addEventListener('pointerlockchange', () => { 
            if(!document.pointerLockElement) keys.w = keys.a = keys.s = keys.d = false;
        });
        document.addEventListener('mousemove', (e) => { if (document.pointerLockElement) { camAngle -= e.movementX * 0.004; camTilt = Math.max(-0.6, Math.min(1.2, camTilt + e.movementY * 0.004)); } });

        function animate() {
            requestAnimationFrame(animate);
            let inputX = 0, inputZ = 0;
            
            if (isDead) {
                keys.w = false; keys.a = false; keys.s = false; keys.d = false;
            } else if (document.activeElement !== chatInput) {
                if (keys.w) inputZ -= 1; if (keys.s) inputZ += 1;
                if (keys.a) inputX -= 1; if (keys.d) inputX += 1;
            }
            
            const isMoving = inputX !== 0 || inputZ !== 0;
            if (isMoving) myCurrentEmote = ""; 

            if (isMoving) {
                const moveVec = new THREE.Vector3(inputX, 0, inputZ).normalize();
                moveVec.applyAxisAngle(new THREE.Vector3(0, 1, 0), camAngle);
                const speed = 0.28;
                player.position.x += moveVec.x * speed;
                player.position.z += moveVec.z * speed;
                
                if (shiftLock || currentZoom < 1.5) {
                    player.rotation.y = camAngle + Math.PI;
                } else {
                    const targetRot = Math.atan2(moveVec.x, moveVec.z);
                    let diff = targetRot - player.rotation.y;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    player.rotation.y += diff * 0.15;
                }
            } else if (shiftLock || currentZoom < 1.5) {
                player.rotation.y = camAngle + Math.PI;
            }

            // --- COLLISION DETECTION ---
            for (const id in peers) {
                const peerMesh = peers[id].mesh;
                const dx = player.position.x - peerMesh.position.x;
                const dz = player.position.z - peerMesh.position.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                const minDist = 1.5; 
                if (dist < minDist && dist > 0.01 && !isDead) {
                    const push = minDist - dist;
                    player.position.x += (dx / dist) * push;
                    player.position.z += (dz / dist) * push;
                }
            }

            // --- ANIMATE FALLING DEAD PARTS ---
            for (let i = fallingParts.length - 1; i >= 0; i--) {
                const p = fallingParts[i];
                p.userData.velocity.y -= 0.015; // Gravity
                p.position.add(p.userData.velocity); // Move part
                
                // Floor Collision (Bounce and slide)
                if (p.position.y <= 0.6) {
                    p.position.y = 0.6;
                    p.userData.velocity.y *= -0.4; // Bounce
                    p.userData.velocity.x *= 0.8; // Friction
                    p.userData.velocity.z *= 0.8;
                    p.userData.rotVelocity.multiplyScalar(0.8); // Slow rotation
                } else {
                    // Spin while falling
                    p.rotation.x += p.userData.rotVelocity.x;
                    p.rotation.y += p.userData.rotVelocity.y;
                    p.rotation.z += p.userData.rotVelocity.z;
                }
            }

            // NETWORK EMIT - 20 times a second
            if (Date.now() - lastEmitTime > 50) {
                socket.emit('move', { 
                    name: myName, x: player.position.x, y: player.position.y, z: player.position.z, rot: player.rotation.y, 
                    moving: isMoving, chatMsg: myLastMessage, chatId: myLastMessageId, emote: myCurrentEmote,
                    dead: isDead 
                });
                lastEmitTime = Date.now();
            }

            // ==========================================
            // MULTIPLAYER ANIMATION LOOP
            // ==========================================
            for (const id in peers) {
                const p = peers[id];
                p.mesh.position.lerp(p.targetPos, 0.2);
                let diff = p.targetRot - p.mesh.rotation.y;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                p.mesh.rotation.y += diff * 0.2;
                
                // MULTIPLAYER DEATH
                if (p.isDead && !p.mesh.userData.isDeadState) {
                    shatterCharacter(p.mesh, [p.torso, p.head, p.armLMesh, p.armRMesh, p.legLMesh, p.legRMesh]);
                    p.mesh.userData.isDeadState = true;
                } else if (!p.isDead && p.mesh.userData.isDeadState) {
                    healCharacter(p.mesh);
                    p.mesh.userData.isDeadState = false;
                }

                if (!p.isDead) {
                    if (p.targetPos.y > 0.1) {
                        // MULTIPLAYER CLASSIC JUMP
                        p.armL.rotation.x = THREE.MathUtils.lerp(p.armL.rotation.x, -3.14, 0.2);
                        p.armR.rotation.x = THREE.MathUtils.lerp(p.armR.rotation.x, -3.14, 0.2);
                        p.legL.rotation.x = THREE.MathUtils.lerp(p.legL.rotation.x, 0, 0.2);
                        p.legR.rotation.x = THREE.MathUtils.lerp(p.legR.rotation.x, 0, 0.2);

                    } else if (p.isMoving) {
                        // MULTIPLAYER SMOOTH WALK (Zero Lag!)
                        p.walkTime += 0.25; 
                        const swing = Math.sin(p.walkTime) * 0.8;
                        p.armL.rotation.x = THREE.MathUtils.lerp(p.armL.rotation.x, swing, 0.2);
                        p.armR.rotation.x = THREE.MathUtils.lerp(p.armR.rotation.x, -swing, 0.2);
                        p.legL.rotation.x = THREE.MathUtils.lerp(p.legL.rotation.x, -swing, 0.2);
                        p.legR.rotation.x = THREE.MathUtils.lerp(p.legR.rotation.x, swing, 0.2);
                        p.uGroup.position.y = THREE.MathUtils.lerp(p.uGroup.position.y, 2 + Math.abs(Math.sin(p.walkTime*2)) * 0.1, 0.2);

                    } else if (p.currentEmote === 'custom') {
                        // --- PASTE MULTIPLAYER CUSTOM EMOTE HERE ---


                    } else {
                        p.legL.rotation.x = THREE.MathUtils.lerp(p.legL.rotation.x, 0, 0.1);
                        p.legR.rotation.x = THREE.MathUtils.lerp(p.legR.rotation.x, 0, 0.1);
                        p.armL.rotation.x = THREE.MathUtils.lerp(p.armL.rotation.x, 0, 0.1);
                        p.armR.rotation.x = THREE.MathUtils.lerp(p.armR.rotation.x, 0, 0.1);
                        p.armR.rotation.z = THREE.MathUtils.lerp(p.armR.rotation.z, 0, 0.1);
                        
                        p.legL.rotation.z = THREE.MathUtils.lerp(p.legL.rotation.z, 0, 0.1);
                        p.legR.rotation.z = THREE.MathUtils.lerp(p.legR.rotation.z, 0, 0.1);
                        
                        p.armL.rotation.y = THREE.MathUtils.lerp(p.armL.rotation.y, 0, 0.1);
                        p.armL.rotation.z = THREE.MathUtils.lerp(p.armL.rotation.z, 0, 0.1);
                        p.armR.rotation.y = THREE.MathUtils.lerp(p.armR.rotation.y, 0, 0.1);
                        p.uGroup.rotation.x = THREE.MathUtils.lerp(p.uGroup.rotation.x, 0, 0.1);
                        p.uGroup.rotation.y = THREE.MathUtils.lerp(p.uGroup.rotation.y, 0, 0.1);
                        p.uGroup.rotation.z = THREE.MathUtils.lerp(p.uGroup.rotation.z, 0, 0.1);

                        p.uGroup.position.y = THREE.MathUtils.lerp(p.uGroup.position.y, 2, 0.1);
                        p.walkTime = 0;
                    }
                }
            }

            // ==========================================
            // LOCAL PLAYER ANIMATION LOOP
            // ==========================================
            if (!isDead) {
                if (!isGrounded) {
                    // --- CLASSIC JUMP ANIMATION ---
                    armLGroup.rotation.x = THREE.MathUtils.lerp(armLGroup.rotation.x, -3.14, 0.2);
                    armRGroup.rotation.x = THREE.MathUtils.lerp(armRGroup.rotation.x, -3.14, 0.2);
                    legLGroup.rotation.x = THREE.MathUtils.lerp(legLGroup.rotation.x, 0, 0.2);
                    legRGroup.rotation.x = THREE.MathUtils.lerp(legRGroup.rotation.x, 0, 0.2);

                } else if (isMoving) {
                    // LOCAL PLAYER SMOOTH WALK (Zero Lag!)
                    walkTime += 0.25;
                    const swing = Math.sin(walkTime) * 0.8;
                    armLGroup.rotation.x = THREE.MathUtils.lerp(armLGroup.rotation.x, swing, 0.2);
                    armRGroup.rotation.x = THREE.MathUtils.lerp(armRGroup.rotation.x, -swing, 0.2);
                    legLGroup.rotation.x = THREE.MathUtils.lerp(legLGroup.rotation.x, -swing, 0.2);
                    legRGroup.rotation.x = THREE.MathUtils.lerp(legRGroup.rotation.x, swing, 0.2);
                    upperBodyGroup.position.y = THREE.MathUtils.lerp(upperBodyGroup.position.y, 2 + Math.abs(Math.sin(walkTime*2)) * 0.1, 0.2);

                } else if (myCurrentEmote === 'custom') {
                    // --- PASTE LOCAL CUSTOM EMOTE HERE ---


                } else {
                    let lerp = 0.1;
                    let breath = Math.sin(Date.now() * 0.002) * 0.03;
                    legLGroup.rotation.x = THREE.MathUtils.lerp(legLGroup.rotation.x, 0, lerp);
                    legRGroup.rotation.x = THREE.MathUtils.lerp(legRGroup.rotation.x, 0, lerp);
                    armLGroup.rotation.x = THREE.MathUtils.lerp(armLGroup.rotation.x, 0, lerp);
                    armRGroup.rotation.x = THREE.MathUtils.lerp(armRGroup.rotation.x, 0, lerp);
                    armRGroup.rotation.z = THREE.MathUtils.lerp(armRGroup.rotation.z, 0, lerp);
                    
                    legLGroup.rotation.z = THREE.MathUtils.lerp(legLGroup.rotation.z, 0, lerp);
                    legRGroup.rotation.z = THREE.MathUtils.lerp(legRGroup.rotation.z, 0, lerp);
                    
                    armLGroup.rotation.y = THREE.MathUtils.lerp(armLGroup.rotation.y, 0, lerp);
                    armLGroup.rotation.z = THREE.MathUtils.lerp(armLGroup.rotation.z, 0, lerp);
                    armRGroup.rotation.y = THREE.MathUtils.lerp(armRGroup.rotation.y, 0, lerp);
                    upperBodyGroup.rotation.x = THREE.MathUtils.lerp(upperBodyGroup.rotation.x, 0, lerp);
                    upperBodyGroup.rotation.y = THREE.MathUtils.lerp(upperBodyGroup.rotation.y, 0, lerp);
                    upperBodyGroup.rotation.z = THREE.MathUtils.lerp(upperBodyGroup.rotation.z, 0, lerp);

                    upperBodyGroup.position.y = THREE.MathUtils.lerp(upperBodyGroup.position.y, 2 + breath, lerp);
                    walkTime = 0;
                }
            }

            velocityY -= 0.025; player.position.y += velocityY;
            if (player.position.y <= 0) { player.position.y = 0; velocityY = 0; isGrounded = true; }

            // --- CAMERA ZOOM LOGIC ---
            currentZoom = THREE.MathUtils.lerp(currentZoom, targetZoom, 0.1);
            
            let pOpacity = Math.max(0, Math.min(1, (currentZoom - 1.5) / 1.5)); 
            player.traverse((child) => {
                if (child.isMesh && !child.isSprite && child.material) {
                    child.material.transparent = true; child.material.opacity = pOpacity; child.material.depthWrite = pOpacity > 0.5; 
                }
            });
            player.visible = (!isDead && pOpacity > 0.05); // Completely hide if dead or in first person

            const isFirstPerson = currentZoom < 1.5;
            const sideOffset = (shiftLock && !isFirstPerson) ? 3 : 0; 
            const offsetVec = new THREE.Vector3(sideOffset, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), camAngle);

            if (isFirstPerson) {
                camera.position.x = player.position.x;
                
                // Drop camera to floor if dead in first person!
                const camHeight = (isDead) ? 0.5 : 3.2;
                camera.position.y = player.position.y + camHeight; 
                camera.position.z = player.position.z;
                
                const targetX = player.position.x + Math.sin(camAngle + Math.PI);
                const targetY = player.position.y + camHeight - (camTilt * 2);
                const targetZ = player.position.z + Math.cos(camAngle + Math.PI);
                
                camera.lookAt(targetX, targetY, targetZ);
            } else {
                camera.position.x = player.position.x + Math.sin(camAngle) * currentZoom + offsetVec.x;
                camera.position.y = player.position.y + 6 + (camTilt * (currentZoom * 0.7)); 
                camera.position.z = player.position.z + Math.cos(camAngle) * currentZoom + offsetVec.z;
                
                camera.lookAt(player.position.x + offsetVec.x, player.position.y + 2, player.position.z + offsetVec.z);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
